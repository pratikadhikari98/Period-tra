<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a3a5c" id="themeMetaColor">
<meta name="description" content="श्री दुर्गा वैदिक संस्कृत विद्यापीठ — रियल-टाइम पिरेड ट्र्याकर">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content=" Durgā Vaidik">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>श्री दुर्गा वैदिक संस्कृत विद्यापीठ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700;900&display=swap');

/* ════════════════════════════════
   THEME TOKENS
════════════════════════════════ */
:root {
  --primary: #1a3a5c;
  --primary-dark: #0d2640;
  --primary-mid: #2a5c8a;
  --accent: #e85d26;
  --gold: #f5a623;
  --gold-light: #ffd87a;
  --bg: #f0f4f8;
  --card-bg: #ffffff;
  --text: #1a2a3a;
  --muted: #6b7f94;
  --success: #2e7d32;
  --success-bg: #e8f4e8;
  --header-grad: linear-gradient(135deg, #1a3a5c 0%, #2a5c8a 100%);
  --clock-bg: #0d2640;
  --tab-border: #d0dce8;
  --tab-bg: white;
  --glass-bg: rgba(255,255,255,0.12);
  --glass-border: rgba(255,255,255,0.25);
  --glass-blur: blur(20px);
  --shadow-card: 0 2px 8px rgba(0,0,0,0.07);
  --radius: 14px;
}

/* ════════════════════════════════
   BASE STYLES
════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Serif Devanagari', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.4s ease, color 0.3s ease;
}

/* ── PHOTO HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  width: 100%;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  background: var(--primary-dark);
}
.header-photo {
  width: 100%;
  display: block;
  max-height: 200px;
  object-fit: cover;
  object-position: center;
}
.header-placeholder { display: none; }
.header-change-btn { display: none; }
#photoInput { display: none; }

.header-spacer { display: none; }

/* ── INSTALL BANNER ── */
#installBanner {
  display: none;
  background: linear-gradient(90deg, #e85d26, #f5a623);
  color: white;
  padding: 9px 14px;
  font-size: 0.76rem;
  font-weight: 600;
  gap: 10px;
  align-items: center;
  justify-content: center;
}
#installBanner.show { display: flex; }
#installBanner button {
  background: white; color: #e85d26; border: none;
  border-radius: 20px; padding: 4px 14px;
  font-family: inherit; font-size: 0.74rem; font-weight: 700; cursor: pointer;
}

/* ── CLOCK ── */
.clock-bar {
  background: transparent;
  color: var(--text);
  text-align: center;
  padding: 18px 16px 10px;
  display: flex; justify-content: center; align-items: center;
}
.clock-inner { display: flex; flex-direction: column; align-items: center; gap: 0; width: 100%; }

/* Analog Clock */
.analog-clock-wrap {
  position: relative;
  width: 170px; height: 170px;
  margin: 0 auto 6px;
}
.analog-clock-svg {
  width: 170px; height: 170px;
  filter: drop-shadow(0 6px 24px rgba(26,58,92,0.22));
}
/* Digital time below the clock */
.clock-digital-row {
  display: flex; align-items: baseline; gap: 2px;
  margin-top: 2px;
}
.clock-time {
  font-size: 1.55rem; font-weight: 900; color: var(--primary);
  letter-spacing: 2px; font-variant-numeric: tabular-nums; line-height: 1;
}
.clock-seconds {
  font-size: 1rem; font-weight: 700; color: var(--accent);
  letter-spacing: 1px; font-variant-numeric: tabular-nums; line-height: 1;
}
.clock-ampm {
  font-size: 0.78rem; font-weight: 700; color: var(--muted);
  margin-left: 4px; align-self: center;
}
.clock-date { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

/* ── HEARTBEAT ── */
/* ── ANIM PICKER ── */
.anim-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 8px;
  gap: 6px;
  width: 100%;
}
.anim-canvas-wrap {
  width: 100%;
  height: 44px;
  position: relative;
  overflow: hidden;
}
#animCanvas {
  width: 100%;
  height: 44px;
  display: block;
}
.anim-dots-btn {
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 2px 6px;
  border-radius: 20px;
  transition: background 0.2s;
}
.anim-dots-btn:hover { background: rgba(0,0,0,0.06); }
.anim-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--primary);
  opacity: 0.35;
  transition: opacity 0.2s, transform 0.2s;
}
.anim-dot.active { opacity: 1; transform: scale(1.3); }
/* Picker popup */
.anim-picker {
  display: none;
  position: fixed;
  background: white;
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.22);
  padding: 8px;
  gap: 4px;
  flex-direction: column;
  z-index: 9999;
  width: 200px;
  left: 50%;
  transform: translateX(-50%);
  top: 50%;
  margin-top: -160px;
  max-height: 80vh;
  overflow-y: auto;
}
.anim-picker.show { display: flex; }
.anim-option {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  transition: background 0.15s;
  border: none;
  background: none;
  font-family: inherit;
  width: 100%;
  text-align: left;
}
.anim-option:hover { background: var(--bg); }
.anim-option.selected { background: rgba(26,58,92,0.1); color: var(--primary); }
.anim-option .anim-icon { font-size: 1.1rem; }

/* ── CURRENT PERIOD BANNER ── */
.current-banner {
  margin: 13px 13px 0;
  border-radius: var(--radius);
  padding: 15px 17px;
  background: var(--header-grad);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  color: white;
  box-shadow: var(--shadow-card), 0 0 0 1px var(--glass-border);
  position: relative; overflow: hidden;
  transition: background 0.4s;
}
.current-banner::before {
  content: ''; position: absolute;
  top: -25px; right: -25px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
}
.banner-label { font-size: 0.65rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 3px; }
.banner-period { font-size: 1.4rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 12px rgba(245,166,35,0.3); }
.banner-time { font-size: 0.78rem; opacity: 0.78; margin-top: 2px; }
.banner-status { margin-top: 7px; font-size: 0.82rem; font-weight: 600; }
.progress-bar-wrap { margin-top: 10px; background: rgba(255,255,255,0.15); border-radius: 8px; height: 6px; overflow: hidden; }
.progress-bar { height: 6px; border-radius: 8px; background: linear-gradient(90deg, var(--gold), var(--gold-light)); transition: width 1s linear; }

.no-period-banner {
  margin: 13px 13px 0;
  border-radius: var(--radius);
  padding: 15px 17px;
  background: var(--success-bg);
  border: 2px dashed var(--success);
  text-align: center;
  backdrop-filter: blur(12px);
}
.no-period-banner .icon { font-size: 1.7rem; }
.no-period-banner p { font-size: 0.86rem; color: var(--success); font-weight: 600; margin-top: 4px; line-height: 1.5; }
.khaja-today {
  margin-top: 10px;
  padding: 8px 14px;
  background: rgba(255,255,255,0.55);
  border-radius: 10px;
  display: inline-block;
  font-size: 0.84rem;
  color: var(--text);
  font-weight: 600;
}
.khaja-today strong { color: var(--accent); font-size: 0.95rem; }

/* ── TABS ── */
.tabs {
  display: flex; gap: 7px;
  padding: 13px 13px 9px;
  overflow-x: auto; scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--tab-border);
  background: var(--tab-bg);
  backdrop-filter: blur(10px);
  font-family: inherit; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; white-space: nowrap; color: var(--muted);
  transition: all 0.2s;
}
.tab.active { background: var(--primary); color: white; border-color: var(--primary); }

/* ── SECTION TITLE ── */
.section-title {
  padding: 3px 13px 7px;
  font-size: 0.72rem; font-weight: 700; color: var(--muted);
  text-transform: uppercase; letter-spacing: 1px;
}

/* ── CARDS GRID ── */
.cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; padding: 0 13px 13px; }
.card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 12px 11px;
  box-shadow: var(--shadow-card);
  border-left: 4px solid #ccc;
  position: relative; transition: all 0.3s;
}
.card.active-now {
  border-left-color: var(--accent);
  box-shadow: 0 4px 16px rgba(232,93,38,0.15);
}
.card.active-now::after {
  content: '● LIVE';
  position: absolute; top: 7px; right: 8px;
  font-size: 0.56rem; font-weight: 700; color: var(--accent);
  letter-spacing: 0.5px; animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
.card-class { font-size: 0.62rem; color: var(--muted); font-weight: 700; margin-bottom: 3px; text-transform: uppercase; }
.card-subject { font-size: 0.86rem; font-weight: 700; color: var(--text); line-height: 1.25; }
.card-teacher { font-size: 0.74rem; font-weight: 600; margin-top: 4px; }
.card-period { font-size: 0.62rem; color: var(--muted); margin-top: 3px; }

/* ── TEACHER CARDS ── */
.teacher-card {
  background: var(--card-bg);
  border-radius: 12px;
  margin: 0 13px 9px;
  padding: 12px 14px;
  box-shadow: var(--shadow-card);
  display: flex; align-items: center; gap: 12px;
  transition: all 0.3s;
}
.teacher-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem; font-weight: 900; color: white; flex-shrink: 0;
}
.teacher-name { font-size: 0.9rem; font-weight: 700; color: var(--text); }
.teacher-now { font-size: 0.74rem; color: var(--accent); font-weight: 600; margin-top: 2px; }
.teacher-where { font-size: 0.68rem; color: var(--muted); margin-top: 1px; }
.free-badge { margin-left: auto; background: var(--success-bg); color: var(--success); padding: 3px 9px; border-radius: 12px; font-size: 0.63rem; font-weight: 700; flex-shrink: 0; }
.busy-badge { margin-left: auto; background: rgba(230,81,0,0.12); color: #e65100; padding: 3px 9px; border-radius: 12px; font-size: 0.63rem; font-weight: 700; flex-shrink: 0; }

/* ── FULL TABLE ── */
.table-wrap { padding: 0 13px 20px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.69rem; background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-card); min-width: 560px; }
th { background: var(--primary); color: white; padding: 8px 5px; text-align: center; font-weight: 700; }
td { padding: 6px 4px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); vertical-align: middle; color: var(--text); }
td .subj { font-weight: 700; display: block; font-size: 0.7rem; }
td .tchr { color: var(--primary); font-size: 0.62rem; }
tr:hover td { background: rgba(0,0,0,0.02); }
.active-col { background: rgba(232,93,38,0.06) !important; }
.class-cell { background: var(--primary); color: white; font-weight: 900; font-size: 0.86rem; }
.break-cell { background: #c62828; color: white; font-weight: 700; font-size: 0.6rem; }

/* ── WIDGET SECTION ── */
.widget-section { padding: 0 13px 20px; }
.widget-title { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

.widget-preview {
  display: flex; flex-direction: column; gap: 10px;
  margin-bottom: 16px;
}

/* Small Widget */
.widget-sm {
  width: 155px; height: 155px;
  border-radius: 22px;
  padding: 14px;
  background: var(--header-grad);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  color: white;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative; overflow: hidden;
}
.widget-sm::before {
  content: ''; position: absolute;
  top: -20px; right: -20px;
  width: 80px; height: 80px; border-radius: 50%;
  background: rgba(255,255,255,0.05);
}
.w-label { font-size: 0.58rem; opacity: 0.65; text-transform: uppercase; letter-spacing: 0.8px; }
.w-period { font-size: 1.3rem; font-weight: 900; color: var(--gold); line-height: 1.1; margin-top: 2px; text-shadow: 0 0 10px rgba(245,166,35,0.4); }
.w-time { font-size: 0.62rem; opacity: 0.75; margin-top: 3px; }
.w-progress { height: 3px; border-radius: 4px; background: rgba(255,255,255,0.2); margin-top: 6px; }
.w-progress-fill { height: 3px; border-radius: 4px; background: var(--gold); }

/* Medium Widget */
.widget-md {
  width: 100%;
  max-width: 340px;
  height: 155px;
  border-radius: 22px;
  padding: 14px 16px;
  background: var(--header-grad);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.15);
  color: white;
  display: flex; flex-direction: column; justify-content: space-between;
  position: relative; overflow: hidden;
}
.widget-md::after {
  content: ''; position: absolute;
  bottom: -30px; right: -30px;
  width: 100px; height: 100px; border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.w-md-top { display: flex; justify-content: space-between; align-items: flex-start; }
.w-md-school { font-size: 0.6rem; opacity: 0.65; max-width: 60%; line-height: 1.3; }
.w-md-time { font-size: 1rem; font-weight: 900; color: var(--gold); }
.w-md-period { font-size: 1.5rem; font-weight: 900; color: white; line-height: 1; }
.w-md-sub { font-size: 0.68rem; opacity: 0.7; margin-top: 2px; }
.w-md-remaining { font-size: 0.62rem; color: var(--gold-light); font-weight: 600; margin-top: 4px; }

/* Widget rows */
.widget-row { display: flex; gap: 10px; align-items: flex-start; }

.widget-hint {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 12px 14px;
  box-shadow: var(--shadow-card);
  font-size: 0.76rem;
  color: var(--muted);
  line-height: 1.65;
  border-left: 3px solid var(--gold);
}
.widget-hint strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 0.8rem; }

.hidden { display: none !important; }

/* OVERLAY */

.footer { text-align: center; padding: 18px 16px 32px; color: var(--muted); font-size: 0.68rem; line-height: 1.8; }
.pwa-hint { font-size: 0.64rem; color: var(--muted); opacity: 0.6; margin-top: 3px; }
</style>
</head>
<body>

<!-- HEADER PHOTO -->
<div class="header">
  <img class="header-photo" src="photos/headerphoto.png" alt="विद्यालय फोटो">
</div>


<!-- INSTALL BANNER -->
<div id="installBanner">
  <span>📲 Home Screen मा थप्नुहोस्</span>
  <button id="installBtn">Install</button>
  <button onclick="document.getElementById('installBanner').classList.remove('show')" style="background:transparent;color:white;padding:4px 8px;border:none;cursor:pointer;font-size:1rem;">✕</button>
</div>

<!-- CLOCK -->
<div class="clock-bar">
  <div class="clock-inner">
    <!-- Analog Clock -->
    <div class="analog-clock-wrap">
      <svg class="analog-clock-svg" id="analogClock" viewBox="0 0 170 170" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer glow ring -->
        <circle cx="85" cy="85" r="82" fill="none" stroke="rgba(26,58,92,0.10)" stroke-width="3"/>
        <!-- Main face gradient -->
        <defs>
          <radialGradient id="faceGrad" cx="40%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e8eef5"/>
          </radialGradient>
          <radialGradient id="centerGrad" cx="50%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#2a5c8a"/>
            <stop offset="100%" stop-color="#0d2640"/>
          </radialGradient>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.18)"/>
          </filter>
        </defs>
        <!-- Clock face -->
        <circle cx="85" cy="85" r="80" fill="url(#faceGrad)" stroke="#1a3a5c" stroke-width="4" filter="url(#shadow)"/>
        <!-- Gold ring -->
        <circle cx="85" cy="85" r="76" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.5"/>
        <!-- Hour tick marks -->
        <g id="tickMarks"></g>
        <!-- School logo area — subtle Om symbol center -->
        <text x="85" y="58" text-anchor="middle" font-size="11" fill="#1a3a5c" opacity="0.18" font-family="serif">ॐ</text>
        <!-- School name tiny -->
        <text x="85" y="108" text-anchor="middle" font-size="5.5" fill="#6b7f94" letter-spacing="0.5">दुर्गा विद्यापीठ</text>
        <!-- Hour hand -->
        <line id="hourHand" x1="85" y1="85" x2="85" y2="45"
          stroke="#1a3a5c" stroke-width="5" stroke-linecap="round"/>
        <!-- Minute hand -->
        <line id="minuteHand" x1="85" y1="85" x2="85" y2="30"
          stroke="#2a5c8a" stroke-width="3.5" stroke-linecap="round"/>
        <!-- Second hand -->
        <line id="secondHand" x1="85" y1="95" x2="85" y2="22"
          stroke="#e85d26" stroke-width="1.8" stroke-linecap="round"/>
        <!-- Center cap -->
        <circle cx="85" cy="85" r="6" fill="url(#centerGrad)"/>
        <circle cx="85" cy="85" r="3" fill="#f5a623"/>
        <circle cx="85" cy="85" r="1.2" fill="white"/>
      </svg>
    </div>
    <!-- Digital display -->
    <div class="clock-digital-row">
      <div class="clock-time" id="clockHM">--:--</div>
      <div class="clock-seconds" id="clockSec">:--</div>
      <div class="clock-ampm" id="clockAmPm">--</div>
    </div>
    <div class="clock-date" id="dateDisplay">--</div>
    <div class="anim-wrap" style="position:relative;">
      <div class="anim-canvas-wrap">
        <canvas id="animCanvas" height="44"></canvas>
      </div>
      <button class="anim-dots-btn" onclick="toggleAnimPicker()" title="Animation छान्नुस्">
        <span class="anim-dot active" id="dot0"></span>
        <span class="anim-dot" id="dot1"></span>
        <span class="anim-dot" id="dot2"></span>
        <span class="anim-dot" id="dot3"></span>
        <span class="anim-dot" id="dot4"></span>
        <span class="anim-dot" id="dot5"></span>
        <span class="anim-dot" id="dot6"></span>
        <span class="anim-dot" id="dot7"></span>
        <span class="anim-dot" id="dot8"></span>
        <span class="anim-dot" id="dot9"></span>
        <span class="anim-dot" id="dot10"></span>
        <span class="anim-dot" id="dot11"></span>
        <span class="anim-dot" id="dot12"></span>
        <span class="anim-dot" id="dot13"></span>
      </button>
      <div class="anim-picker" id="animPicker">
        <button class="anim-option selected" onclick="setAnim(0)"><span class="anim-icon">💓</span> ECG Heartbeat</button>
        <button class="anim-option" onclick="setAnim(1)"><span class="anim-icon">🌊</span> पानी बग्ने Wave</button>
        <button class="anim-option" onclick="setAnim(2)"><span class="anim-icon">🫧</span> Breathing Circle</button>
        <button class="anim-option" onclick="setAnim(3)"><span class="anim-icon">🎵</span> Equalizer Bars</button>
        <button class="anim-option" onclick="setAnim(4)"><span class="anim-icon">⭐</span> Star Twinkle</button>
        <button class="anim-option" onclick="setAnim(5)"><span class="anim-icon">🔥</span> Fire Flame</button>
        <button class="anim-option" onclick="setAnim(6)"><span class="anim-icon">🌸</span> Falling Petals</button>
        <button class="anim-option" onclick="setAnim(7)"><span class="anim-icon">🌀</span> DNA Helix</button>
        <button class="anim-option" onclick="setAnim(8)"><span class="anim-icon">❄️</span> Snow Fall</button>
        <button class="anim-option" onclick="setAnim(9)"><span class="anim-icon">🪐</span> Orbit Rings</button>
        <button class="anim-option" onclick=
